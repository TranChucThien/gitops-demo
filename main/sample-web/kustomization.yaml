apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: main-sample-web
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: sample-web
      app.kubernetes.io/part-of: applicationset-demo
      app.kubernetes.io/managed-by: argocd
      environment: main
