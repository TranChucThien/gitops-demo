apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-web
    spec:
      containers:
        - name: sample-web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
