apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sample-web
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/TranChucThien/gitops-demo.git
        revision: main
        directories:
          - path: main/*
          - path: uat/*
  template:
    metadata:
      name: '{{ index .path.segments 0 }}-{{ .path.basenameNormalized }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/TranChucThien/gitops-demo.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        # server: https://kubernetes.default.svc
        name: in-cluster
        namespace: '{{ index .path.segments 0 }}-{{ .path.basenameNormalized }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
