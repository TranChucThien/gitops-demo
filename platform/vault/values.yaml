global:
  enabled: true
  tlsDisable: true

injector:
  enabled: true

server:
  enabled: true
  dev:
    enabled: true
    devRootToken: root

  service:
    enabled: true
    type: ClusterIP
    port: 8200
    targetPort: 8200
    annotations:
      platform.chucthien.com/ingress: "true"

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ui:
  enabled: true
  serviceType: ClusterIP
  externalPort: 8200
