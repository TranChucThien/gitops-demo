apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-service-ingress
  annotations:
    policies.kyverno.io/title: Generate Ingress From Service Annotation
    policies.kyverno.io/category: Platform
spec:
  generateExisting: true
  rules:
    - name: generate-ingress
      match:
        any:
          - resources:
              kinds:
                - Service
      preconditions:
        all:
          - key: '{{ request.object.metadata.annotations."platform.chucthien.com/ingress" || "" }}'
            operator: Equals
            value: "true"
      generate:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: '{{ request.object.metadata.name }}'
        namespace: '{{ request.object.metadata.namespace }}'
        synchronize: true
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              app.kubernetes.io/part-of: ingress-automation
            annotations:
              cert-manager.io/cluster-issuer: local-selfsigned
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - '{{ request.object.metadata.name }}.{{ request.object.metadata.namespace }}.ingress.chucthien.com'
                secretName: '{{ request.object.metadata.name }}-local-tls'
            rules:
              - host: '{{ request.object.metadata.name }}.{{ request.object.metadata.namespace }}.ingress.chucthien.com'
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: '{{ request.object.metadata.name }}'
                          port:
                            name: http
